# Kenâr — local + single-server stack.
# All services self-hostable on one Iranian server. No foreign cloud SaaS.
#
# Usage:
#   cp .env.example .env   # then edit secrets
#   docker compose up -d
#
# Data volumes live under ./data (gitignored).

services:
  postgres:
    image: postgres:16-alpine
    container_name: kenar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kenar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kenar}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kenar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kenar-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kenar-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kenar}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - ./data/minio:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kenar-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KENAR_HTTP_ADDR: ":8080"
      KENAR_DB_DSN: "postgres://${POSTGRES_USER:-kenar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kenar}?sslmode=disable"
      KENAR_REDIS_ADDR: "redis:6379"
      KENAR_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      KENAR_MINIO_ENDPOINT: "minio:9000"
      KENAR_MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-kenar}"
      KENAR_MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      KENAR_DEFAULT_LOCALE: "fa"
      # Provider secrets (see .env.example)
      KENAR_SMS_PROVIDER: "${KENAR_SMS_PROVIDER:-kavenegar}"
      KENAR_KAVENEGAR_API_KEY: "${KENAR_KAVENEGAR_API_KEY:-}"
      KENAR_PUSH_PROVIDER: "${KENAR_PUSH_PROVIDER:-pushe}"
      KENAR_PUSHE_TOKEN: "${KENAR_PUSHE_TOKEN:-}"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
